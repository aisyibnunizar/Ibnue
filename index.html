<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile | @Ibnue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #23d5ab; /* Teal */
            --secondary-accent: #e73c7e; /* Pink */
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* --- Animasi Background Premium --- */
        .background-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--secondary-accent), #23a6d5);
            filter: blur(80px);
            animation: move 20s infinite alternate;
            opacity: 0.3;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(100%, 100%); }
        }

        /* --- Container Utama (Glassmorphism) --- */
        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: containerAppear 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- FLUID AURA WAVES PROFILE ANIMATION (Super Premium) --- */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            z-index: 5;
            padding: 10px; /* Spasi untuk gelombang */
        }

        /* Lapisan Aura Fluid 1 */
        .profile-wrapper::before,
        .profile-wrapper::after,
        .fluid-wave-3,
        .fluid-wave-4 {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Akan diubah secara organic di keyframes */
            background: linear-gradient(45deg, transparent, rgba(35, 213, 171, 0.2));
            filter: blur(5px);
            opacity: 0;
            transition: opacity 1s ease, transform 0.5s ease-out;
            z-index: -1;
            pointer-events: none;
        }

        /* Efek nyala tipis di pinggir */
        .profile-wrapper::before { border: 1.5px solid rgba(35, 213, 171, 0.1); }
        .profile-wrapper::after { background: radial-gradient(circle, rgba(231, 60, 126, 0.1) 0%, transparent 70%); }

        /* Tambahan lapisan untuk kedalaman */
        .fluid-wave-3 { background: linear-gradient(135deg, transparent, rgba(231, 60, 126, 0.15)); filter: blur(10px); }
        .fluid-wave-4 { border: 1px solid rgba(255, 255, 255, 0.05); filter: blur(2px); }

        /* Logika Aktif saat .music-on */
        .music-on.profile-wrapper::before,
        .music-on.profile-wrapper::after,
        .music-on .fluid-wave-3,
        .music-on .fluid-wave-4 {
            opacity: 1;
            /*cubic-bezier super smooth lambat */
            animation: fluidAura 8s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        }

        /* Delay agar gelombang mengalir organik */
        .music-on.profile-wrapper::after { animation-delay: 2s; }
        .music-on .fluid-wave-3 { animation-delay: 4s; }
        .music-on .fluid-wave-4 { animation-delay: 6s; }

        @keyframes fluidAura {
            0% {
                width: 130px; height: 130px;
                transform: translate(-50%, -50%) rotate(0deg);
                border-radius: 50%;
            }
            25% {
                border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; /* Organic shape 1 */
            }
            50% {
                width: 280px; height: 280px; /* Membesar perlahan */
                transform: translate(-50%, -50%) rotate(180deg);
                border-radius: 60% 40% 45% 55% / 45% 50% 50% 55%; /* Organic shape 2 */
                opacity: 0.8;
            }
            75% {
                border-radius: 45% 55% 50% 50% / 60% 40% 55% 45%; /* Organic shape 3 */
            }
            100% {
                width: 130px; height: 130px;
                transform: translate(-50%, -50%) rotate(360deg);
                border-radius: 50%;
                opacity: 0;
            }
        }

        /* Foto Profil Premium */
        .profile-img {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            position: relative;
            z-index: 2;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 1s ease;
        }

        /* Efek foto saat musik on */
        .music-on .profile-img {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(35, 213, 171, 0.4);
            animation: pulseImg 2s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955);
        }

        @keyframes pulseImg {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        /* --- Typography --- */
        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 0.85rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* --- Links --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .link-card:nth-child(1) { animation-delay: 0.2s; }
        .link-card:nth-child(2) { animation-delay: 0.3s; }
        .link-card:nth-child(3) { animation-delay: 0.4s; }
        .link-card:nth-child(4) { animation-delay: 0.5s; }
        .link-card:nth-child(5) { animation-delay: 0.6s; }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-card i { font-size: 1.4rem; width: 40px; transition: 0.3s; }
        .link-card:hover i { transform: scale(1.2); color: var(--accent); }
        .link-card span { font-weight: 500; font-size: 0.95rem; flex-grow: 1; text-align: left; }

        /* Icon Colors */
        .fa-tiktok { color: #00f2ea; }
        .fa-instagram { color: #ff0050; }
        .fa-whatsapp { color: #25d366; }
        .fa-telegram { color: #0088cc; }
        .fa-facebook { color: #1877f2; }

        /* --- MUSIC PLAYER UI --- */
        .music-player {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 22px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .music-player:hover { transform: translateY(-5px); border-color: var(--accent); }

        .album-art {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--secondary-accent), var(--accent));
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 4s linear infinite;
            animation-play-state: paused;
        }

        .playing .album-art { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0); } to { transform: rotate(360deg); } }

        .music-info b { font-size: 0.8rem; display: block; color: var(--accent); letter-spacing: 0.5px; }
        .music-info span { font-size: 0.7rem; opacity: 0.7; }

        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 14px; margin-left: 5px; }
        .bar { width: 3px; background: var(--accent); height: 20%; transition: 0.2s; border-radius: 10px; }
        .playing .bar { animation: bounce 0.6s ease-in-out infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce { from { height: 20%; } to { height: 100%; } }

        .footer { margin-top: 35px; font-size: 0.75rem; opacity: 0.4; letter-spacing: 1px; }

        @media (max-width: 480px) {
            .music-player { left: 50%; transform: translateX(-50%); width: 85%; bottom: 20px; justify-content: center; }
            .music-player:hover { transform: translateX(-50%) translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="background-animate">
        <div class="circle" style="width: 300px; height: 300px; top: 15%; left: 10%;"></div>
        <div class="circle" style="width: 450px; height: 450px; bottom: 10%; right: 5%; background: var(--accent);"></div>
    </div>

    <div class="container">
        <div class="profile-wrapper" id="profileWrapper">
            <div class="fluid-wave-3"></div>
            <div class="fluid-wave-4"></div>
            <img src="IMG_20260323_213437_787.webp" alt="Profile" class="profile-img">
        </div>
        
        <h2>@Ibnue</h2>
        <p class="bio">Other Social Media | Student</p>

        <div class="links-container">
            <a href="https://www.tiktok.com/@iyaloo2007?_r=1&_t=ZS-95d975R2Dm1" class="link-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>Tiktok</span>
            </a>
            <a href="https://www.instagram.com/ibnue.nzr?igsh=MW16bHI0aWEybWJxOA==" class="link-card" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://wa.link/3pieq1" class="link-card" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            <a href="https://t.me/ibnue2212" class="link-card" target="_blank">
                <i class="fab fa-telegram"></i>
                <span>Telegram</span>
            </a>
            <a href="https://www.facebook.com/share/1C7Py8pZva/" class="link-card" target="_blank">
                <i class="fab fa-facebook"></i>
                <span>Facebook</span>
            </a>
        </div>

        <div class="footer">&copy; 2026 Crafted with ✨ by <span style="color: var(--accent);">Ibnue</span></div>
    </div>

    <div class="music-player" id="musicBtn">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <div class="music-info">
            <b>Gata only x Peligrosa</b>
            <span>Billie Eilish - WILDFLOWER</span>
        </div>
        <div class="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <audio id="audioSource" loop crossorigin="anonymous">
            <source src="Billie Eilish - WILDFLOWER BILLIE BY FINNEAS.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const audio = document.getElementById('audioSource');
        const profileWrapper = document.getElementById('profileWrapper');
        let isPlaying = false;

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                musicBtn.classList.remove('playing');
                profileWrapper.classList.remove('music-on');
            } else {
                audio.play();
                musicBtn.classList.add('playing');
                profileWrapper.classList.add('music-on');
            }
            isPlaying = !isPlaying;
        }

        musicBtn.addEventListener('click', togglePlay);
    </script>
</body>
</html>
