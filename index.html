<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Profile | @Ibnue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: rgba(255, 255, 255, 0.3);
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a; /* Dark base */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* --- Animasi Background Premium --- */
        .background-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f172a, #1e293b);
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #e73c7e, #23a6d5);
            filter: blur(80px);
            animation: move 20s infinite alternate;
            opacity: 0.5;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(100%, 100%); }
        }

        /* --- Container Utama --- */
        .container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 50px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: containerAppear 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Profile Section --- */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: 0.5s;
        }

        .profile-wrapper:hover .profile-img {
            transform: scale(1.1) rotate(5deg);
            border-color: #23d5ab;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #23d5ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .bio {
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* --- Links Section --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            /* Entrance Animation */
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Delay untuk tiap tombol */
        .link-card:nth-child(1) { animation-delay: 0.2s; }
        .link-card:nth-child(2) { animation-delay: 0.3s; }
        .link-card:nth-child(3) { animation-delay: 0.4s; }
        .link-card:nth-child(4) { animation-delay: 0.5s; }
        .link-card:nth-child(5) { animation-delay: 0.6s; }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-card i {
            font-size: 1.6rem;
            width: 45px;
            transition: 0.3s;
        }

        .link-card:hover i {
            transform: scale(1.2) rotate(-10deg);
        }

        .link-card span {
            font-weight: 500;
            flex-grow: 1;
            text-align: left;
            margin-left: 10px;
        }

        /* Shine Effect */
        .link-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }
        .link-card:hover::after {
            left: 100%;
            top: 100%;
        }

        /* Ikon Colors Premium */
        .fa-tiktok { color: #00f2ea; text-shadow: 0 0 10px #00f2ea; }
        .fa-instagram { color: #ff0050; text-shadow: 0 0 10px #ff0050; }
        .fa-whatsapp { color: #25d366; text-shadow: 0 0 10px #25d366; }
        .fa-telegram { color: #0088cc; text-shadow: 0 0 10px #0088cc; }
        .fa-facebook { color: #1877f2; text-shadow: 0 0 10px #1877f2; }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
